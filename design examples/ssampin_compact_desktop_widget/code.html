<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SsamPin Compact Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Noto+Sans+KR:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom Scrollbar for compact widget feel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="bg-slate-900/50 flex items-center justify-center min-h-screen font-display" style="background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);">
<!-- Widget Container -->
<div class="relative w-[380px] h-[650px] bg-[#0f172a]/80 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-700/50 flex flex-col overflow-hidden text-slate-100">
<!-- Header -->
<header class="flex items-center justify-between px-5 py-3 border-b border-slate-700/50 shrink-0 select-none drag-handle">
<div class="flex items-center gap-2 text-slate-100">
<span class="material-symbols-outlined text-primary" style="font-size: 18px;">push_pin</span>
<h2 class="text-sm font-bold tracking-tight">쌤핀</h2>
</div>
<button class="text-slate-400 hover:text-white transition-colors p-1 rounded hover:bg-slate-700/50">
<span class="material-symbols-outlined" style="font-size: 20px;">open_in_full</span>
</button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto overflow-x-hidden">
<!-- 1. Date/Time/Weather -->
<section class="px-5 pt-5 pb-4 text-center">
<p class="text-slate-400 text-sm font-medium">2월 27일 (금)</p>
<h1 class="text-5xl font-bold text-white tracking-tighter my-2">16:35</h1>
<div class="inline-flex items-center justify-center gap-3 bg-slate-800/50 px-3 py-1.5 rounded-full text-xs text-slate-300 border border-slate-700/30">
<span class="flex items-center gap-1">☁️ 2~10°C</span>
<span class="w-px h-3 bg-slate-600"></span>
<span class="flex items-center gap-1">💧 85%</span>
<span class="w-px h-3 bg-slate-600"></span>
<span class="text-green-400 font-medium">미세 좋음</span>
</div>
</section>
<!-- 2. Banner -->
<section class="px-4 mb-4">
<div class="bg-teal-900/40 border border-teal-500/20 rounded-xl p-3 flex items-center justify-center gap-2 text-teal-100 text-sm font-medium shadow-sm">
<span>오늘의 일정이 모두 끝났습니다! 👏</span>
</div>
</section>
<div class="border-t border-slate-700/40 mx-4 mb-4"></div>
<!-- 3. Timetable -->
<section class="px-5 mb-5">
<div class="flex items-center justify-between mb-3">
<h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">시간표</h3>
<button class="text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 16px;">more_horiz</span>
</button>
</div>
<div class="space-y-1">
<div class="flex items-center text-sm py-1.5 px-2 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400">
<span class="w-8 font-mono text-xs opacity-60">1교시</span>
<span class="flex-1 font-medium">국어</span>
<span class="text-xs opacity-50">3-2</span>
</div>
<!-- Highlighted Period -->
<div class="flex items-center text-sm py-2 px-2 rounded-lg bg-amber-500/10 text-amber-200 border border-amber-500/20">
<span class="w-8 font-mono text-xs text-amber-400/80">2교시</span>
<span class="flex-1 font-bold">수학</span>
<span class="text-xs text-amber-400/80">3-2</span>
</div>
<div class="flex items-center text-sm py-1.5 px-2 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400">
<span class="w-8 font-mono text-xs opacity-60">3교시</span>
<span class="flex-1 font-medium">사회</span>
<span class="text-xs opacity-50">3-2</span>
</div>
<div class="flex items-center text-sm py-1.5 px-2 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400">
<span class="w-8 font-mono text-xs opacity-60">4교시</span>
<span class="flex-1 font-medium">과학</span>
<span class="text-xs opacity-50">3-2</span>
</div>
<div class="flex items-center text-sm py-1.5 px-2 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400">
<span class="w-8 font-mono text-xs opacity-60">5교시</span>
<span class="flex-1 font-medium">음악</span>
<span class="text-xs opacity-50">3-2</span>
</div>
<div class="flex items-center text-sm py-1.5 px-2 rounded-lg hover:bg-slate-800/50 transition-colors text-slate-400">
<span class="w-8 font-mono text-xs opacity-60">6교시</span>
<span class="flex-1 font-medium">창체</span>
<span class="text-xs opacity-50">3-2</span>
</div>
</div>
</section>
<div class="border-t border-slate-700/40 mx-4 mb-4"></div>
<!-- 4. Schedule -->
<section class="px-5 mb-5">
<div class="flex items-center justify-between mb-3">
<h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">일정</h3>
<button class="text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 16px;">calendar_month</span>
</button>
</div>
<div class="space-y-2">
<div class="flex items-center gap-3 text-sm">
<div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
<span class="text-slate-400 font-mono text-xs">3/3</span>
<span class="text-slate-200">시업식</span>
</div>
<div class="flex items-center gap-3 text-sm">
<div class="w-1.5 h-1.5 rounded-full bg-orange-500"></div>
<span class="text-slate-400 font-mono text-xs">3/4</span>
<span class="text-slate-200">안전점검의 날</span>
</div>
<div class="flex items-center gap-3 text-sm">
<div class="w-1.5 h-1.5 rounded-full bg-purple-500"></div>
<span class="text-slate-400 font-mono text-xs">3/8</span>
<span class="text-slate-200">나무학교 워크숍</span>
</div>
<div class="flex items-center gap-3 text-sm">
<span class="material-symbols-outlined text-red-400" style="font-size: 14px;">push_pin</span>
<span class="text-red-400 font-mono text-xs font-bold">D-18</span>
<span class="text-slate-200">중간고사</span>
</div>
</div>
</section>
<div class="border-t border-slate-700/40 mx-4 mb-4"></div>
<!-- 5. To-Do -->
<section class="px-5 mb-5">
<div class="flex items-center justify-between mb-3">
<h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">할 일</h3>
<span class="text-[10px] bg-primary/20 text-primary px-1.5 py-0.5 rounded font-medium">1/3 완료</span>
</div>
<div class="space-y-2">
<label class="flex items-start gap-3 group cursor-pointer">
<div class="relative flex items-center">
<input checked="" class="peer h-4 w-4 appearance-none rounded border border-slate-500 bg-transparent checked:bg-primary checked:border-primary transition-all cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined absolute left-0 top-0 pointer-events-none opacity-0 peer-checked:opacity-100 text-white" style="font-size: 16px;">check</span>
</div>
<span class="text-sm text-slate-500 line-through group-hover:text-slate-400 transition-colors">나이스 성적 마감 확인</span>
</label>
<label class="flex items-start gap-3 group cursor-pointer">
<div class="relative flex items-center">
<input class="peer h-4 w-4 appearance-none rounded border border-slate-500 bg-transparent checked:bg-primary checked:border-primary transition-all cursor-pointer hover:border-primary" type="checkbox"/>
</div>
<span class="text-sm text-slate-200 group-hover:text-white transition-colors">학부모 상담 일지 정리</span>
</label>
<label class="flex items-start gap-3 group cursor-pointer">
<div class="relative flex items-center">
<input class="peer h-4 w-4 appearance-none rounded border border-slate-500 bg-transparent checked:bg-primary checked:border-primary transition-all cursor-pointer hover:border-primary" type="checkbox"/>
</div>
<span class="text-sm text-slate-200 group-hover:text-white transition-colors">주간 학습 안내 가정통신문</span>
</label>
</div>
</section>
<div class="border-t border-slate-700/40 mx-4 mb-4"></div>
<!-- 6. Memo -->
<section class="px-5 pb-8">
<div class="flex items-center justify-between mb-3">
<h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">메모</h3>
<button class="text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 16px;">add</span>
</button>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="bg-yellow-100 dark:bg-yellow-200/90 text-yellow-900 p-3 rounded-lg shadow-sm min-h-[80px] relative group hover:-translate-y-0.5 transition-transform duration-200">
<p class="text-xs font-medium leading-relaxed font-sans">내일 급식지도<br/>잊지말기!</p>
<span class="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-yellow-800/50" style="font-size: 14px;">edit</span>
</span>
</div>
<div class="bg-pink-100 dark:bg-pink-200/90 text-pink-900 p-3 rounded-lg shadow-sm min-h-[80px] relative group hover:-translate-y-0.5 transition-transform duration-200">
<p class="text-xs font-medium leading-relaxed font-sans">김민수 학생<br/>보건실 확인</p>
<span class="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-pink-800/50" style="font-size: 14px;">edit</span>
</span>
</div>
</div>
</section>
</div>
<!-- Bottom Fade -->
<div class="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-[#0f172a]/90 to-transparent pointer-events-none"></div>
</div>
</body></html>
