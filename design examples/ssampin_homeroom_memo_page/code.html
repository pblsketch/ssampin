<!DOCTYPE html>

<span class="text-sm font-medium">홈</span>
</a>
<a class="flex items-center gap-3 px-3 py-3 rounded-xl text-text-secondary hover:bg-slate-700/50 hover:text-white transition-colors" href="#">

</a>
<a class="pb-4 px-2 border-b-[3px] border-transparent text-text-secondary hover:text-white font-medium text-sm flex flex-col items-center gap-1 transition-colors" href="#">

</a>
<a class="pb-4 px-2 border-b-[3px] border-transparent text-text-secondary hover:text-white font-medium text-sm flex flex-col items-center gap-1 transition-colors" href="#">

</a>
<a class="pb-4 px-2 border-b-[3px] border-transparent text-text-secondary hover:text-white font-medium text-sm flex flex-col items-center gap-1 transition-colors" href="#">

</a>

<button class="aspect-[4/3] rounded-lg bg-card-dark hover:bg-slate-700 border border-slate-700 text-slate-300 text-sm font-medium transition-all">10이재현</button>

<button class="px-4 py-2 rounded-full border border-rose-500 bg-rose-600 text-white shadow-md shadow-rose-900/50 text-sm font-bold transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">check</span> 지각

<button class="px-4 py-2 rounded-full border border-rose-500/30 bg-rose-500/10 text-rose-200 hover:bg-rose-500/20 text-sm font-medium transition-colors">조퇴</button>
<button class="px-4 py-2 rounded-full border border-rose-500/30 bg-rose-500/10 text-rose-200 hover:bg-rose-500/20 text-sm font-medium transition-colors">결과</button>
</div>

<button class="px-4 py-2 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-200 hover:bg-blue-500/20 text-sm font-medium transition-colors">학생상담</button>
<button class="px-4 py-2 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-200 hover:bg-blue-500/20 text-sm font-medium transition-colors">교우관계</button>

<button class="px-4 py-2 rounded-full border border-slate-600 bg-slate-700/30 text-slate-300 hover:bg-slate-700/50 text-sm font-medium transition-colors">진로</button>
<button class="px-4 py-2 rounded-full border border-slate-600 bg-slate-700/30 text-slate-300 hover:bg-slate-700/50 text-sm font-medium transition-colors">가정연락</button>
<button class="px-4 py-2 rounded-full border border-slate-600 bg-slate-700/30 text-slate-300 hover:bg-slate-700/50 text-sm font-medium transition-colors">기타</button>
</div>
</div>
</div>
</div>

<div class="bg-card-dark rounded-2xl p-6 border border-slate-700/50 shadow-sm flex-1 flex flex-col">
<h2 class="text-white text-lg font-semibold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-amber-400">edit</span>

<textarea class="w-full flex-1 bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none text-base leading-relaxed" placeholder="추가 메모가 있으면 입력하세요... (선택사항)"></textarea>
</div>
</div>
</div>
</div>
</div>

<div class="absolute bottom-0 left-0 right-0 bg-card-dark border-t border-slate-700 p-6 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.3)]">
<div class="max-w-6xl mx-auto flex flex-col items-center gap-3">
<button class="w-full bg-primary hover:bg-blue-600 text-white text-xl font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all active:scale-[0.99] flex justify-center items-center gap-2">
<span class="material-symbols-outlined">save</span>
                        저장하기
                    </button>
<p class="text-text-secondary text-sm flex items-center gap-1.5">
<span class="material-symbols-outlined text-amber-400 text-base">lightbulb</span>

                    </p>
