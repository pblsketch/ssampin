<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SsamPin Onboarding - Period Times</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3c83f6",
              "background-light": "#f5f7f8",
              "background-dark": "#101722",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Main Layout Container -->
<div class="flex h-full grow flex-col">
<!-- Header -->
<header class="sticky top-0 z-50 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4 lg:px-10">
<div class="flex items-center gap-3">
<div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary/20 text-primary">
<span class="material-symbols-outlined">school</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">SsamPin <span class="text-sm font-medium text-slate-500 dark:text-slate-400">(쌤핀)</span></h1>
</div>
<button class="flex items-center gap-2 rounded-lg px-4 py-2 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-[20px]">logout</span>
<span class="hidden sm:inline">로그아웃</span>
</button>
</header>
<!-- Content Area -->
<main class="flex flex-1 flex-col items-center px-4 py-10 lg:px-8">
<div class="w-full max-w-[800px] flex flex-col gap-8">
<!-- Progress Bar -->
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<span class="text-sm font-semibold text-primary">Step 3. 시간표 설정</span>
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">3/4</span>
</div>
<div class="h-2 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-800">
<div class="h-full w-3/4 rounded-full bg-primary transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Title Section -->
<div class="flex flex-col gap-2">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white">교시 시간 설정</h2>
<p class="text-base text-slate-600 dark:text-slate-400">
                            학교의 수업 시간을 설정해주세요. 미리 설정된 값을 선택하거나 직접 입력할 수 있습니다.
                        </p>
</div>
<!-- Presets Selection -->
<div class="grid grid-cols-1 gap-4 md:grid-cols-3">
<!-- Option 1 -->
<label class="group relative flex cursor-pointer flex-col gap-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-5 shadow-sm transition-all hover:border-primary/50 has-[:checked]:border-primary has-[:checked]:bg-primary/5 has-[:checked]:shadow-md">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-3xl text-slate-400 group-has-[:checked]:text-primary">schedule</span>
<input checked="" class="h-5 w-5 border-2 border-slate-300 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 dark:border-slate-600 dark:bg-transparent dark:checked:bg-primary" name="schedule-type" type="radio"/>
</div>
<div>
<h3 class="font-bold text-slate-900 dark:text-white">기본 6교시</h3>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-1">09:00 시작<br/>45분 수업 / 10분 쉬는시간</p>
</div>
</label>
<!-- Option 2 -->
<label class="group relative flex cursor-pointer flex-col gap-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-5 shadow-sm transition-all hover:border-primary/50 has-[:checked]:border-primary has-[:checked]:bg-primary/5 has-[:checked]:shadow-md">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-3xl text-slate-400 group-has-[:checked]:text-primary">timer</span>
<input class="h-5 w-5 border-2 border-slate-300 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 dark:border-slate-600 dark:bg-transparent dark:checked:bg-primary" name="schedule-type" type="radio"/>
</div>
<div>
<h3 class="font-bold text-slate-900 dark:text-white">기본 7교시 (단축)</h3>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-1">08:50 시작<br/>40분 수업 / 10분 쉬는시간</p>
</div>
</label>
<!-- Option 3 -->
<label class="group relative flex cursor-pointer flex-col gap-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-5 shadow-sm transition-all hover:border-primary/50 has-[:checked]:border-primary has-[:checked]:bg-primary/5 has-[:checked]:shadow-md">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-3xl text-slate-400 group-has-[:checked]:text-primary">edit_note</span>
<input class="h-5 w-5 border-2 border-slate-300 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 dark:border-slate-600 dark:bg-transparent dark:checked:bg-primary" name="schedule-type" type="radio"/>
</div>
<div>
<h3 class="font-bold text-slate-900 dark:text-white">직접 입력</h3>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-1">학교 사정에 맞춰<br/>자유롭게 설정합니다.</p>
</div>
</label>
</div>
<!-- Editable Table Section -->
<div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm overflow-hidden">
<div class="border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 px-6 py-4">
<h3 class="font-bold text-slate-900 dark:text-white">상세 시간표</h3>
</div>
<div class="p-0">
<table class="w-full text-left text-sm">

<tr>
<th class="px-6 py-3 w-1/4">교시</th>
<th class="px-6 py-3 w-1/3">시작 시간</th>
<th class="px-6 py-3 w-1/3">종료 시간</th>
<th class="px-6 py-3 w-1/12 text-center">삭제</th>
</tr>
</thead>
<tbody class="divide-y divide-slate-200 dark:divide-slate-800 text-slate-700 dark:text-slate-300">
<tr class="group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<td class="px-6 py-3 font-medium">1교시</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="09:00"/>

<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="09:45"/>
</td>
<td class="px-6 py-2 text-center">
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</td>
</tr>
<tr class="group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<td class="px-6 py-3 font-medium">2교시</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="09:55"/>
</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="10:40"/>
</td>
<td class="px-6 py-2 text-center">
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</td>
</tr>
<tr class="group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<td class="px-6 py-3 font-medium">3교시</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="10:50"/>
</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="11:35"/>
</td>
<td class="px-6 py-2 text-center">
<button class="text-slate-400 hover:text-red-500 transition-colors">

</button>
</td>
</tr>
<tr class="group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<td class="px-6 py-3 font-medium">4교시</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="11:45"/>
</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="12:30"/>
</td>
<td class="px-6 py-2 text-center">
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</td>
</tr>
<!-- Lunch Time Section (Highlighted) -->
<tr class="bg-primary/5 dark:bg-primary/10">
<td class="px-6 py-3 font-bold text-primary dark:text-primary">점심시간</td>
<td class="px-6 py-2">
<input class="w-full rounded border-primary/30 bg-white px-3 py-1.5 text-sm font-medium text-primary focus:border-primary focus:ring-1 focus:ring-primary dark:border-primary/30 dark:bg-slate-950 dark:text-primary" type="time" value="12:30"/>
</td>
<td class="px-6 py-2">
<input class="w-full rounded border-primary/30 bg-white px-3 py-1.5 text-sm font-medium text-primary focus:border-primary focus:ring-1 focus:ring-primary dark:border-primary/30 dark:bg-slate-950 dark:text-primary" type="time" value="13:30"/>
</td>
<td class="px-6 py-2 text-center">
<!-- Disabled/Hidden for required field -->
<span class="material-symbols-outlined text-[20px] text-slate-300 dark:text-slate-600">lock</span>
</td>
</tr>
<tr class="group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<td class="px-6 py-3 font-medium">5교시</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="13:30"/>
</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="14:15"/>
</td>
<td class="px-6 py-2 text-center">
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</td>
</tr>
<tr class="group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<td class="px-6 py-3 font-medium">6교시</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="14:25"/>
</td>
<td class="px-6 py-2">
<input class="w-full rounded border-slate-300 bg-white px-3 py-1.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200" type="time" value="15:10"/>
</td>
<td class="px-6 py-2 text-center">
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</td>
</tr>
</tbody>
</table>
<div class="border-t border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/30 px-6 py-3 text-center">
<button class="inline-flex items-center gap-2 rounded-lg py-2 px-4 text-sm font-semibold text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[20px]">add_circle</span>
                                    교시 추가하기
                                </button>
</div>
</div>
</div>
<!-- Navigation Buttons -->
<div class="flex items-center justify-between pt-6 border-t border-slate-200 dark:border-slate-800">
<button class="flex min-w-[100px] items-center justify-center gap-2 rounded-xl border border-slate-300 bg-white px-6 py-3 text-base font-bold text-slate-700 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700">
                            이전
                        </button>
<button class="flex min-w-[140px] items-center justify-center gap-2 rounded-xl bg-primary px-6 py-3 text-base font-bold text-white shadow-lg shadow-primary/25 transition-all hover:bg-blue-600 hover:shadow-primary/40 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900">
                            다음
                            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</main>
</div>
</div>
</body></html>
