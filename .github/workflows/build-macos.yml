name: Build macOS

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build macOS DMG
        run: npm run build && npx electron-builder --mac --publish never
        env:
          VITE_DEV_SERVER_URL: ""

      - name: Verify build output
        run: |
          ls -lh release/
          if ! ls release/*.dmg 1>/dev/null 2>&1; then
            echo "::error::No .dmg files found in release/"
            exit 1
          fi

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.blockmap
            release/latest-mac.yml

      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ssampin-macos-${{ github.sha }}
          path: |
            release/*.dmg
            release/*.blockmap
            release/latest-mac.yml
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: success()
        run: |
          echo "## macOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files" >> $GITHUB_STEP_SUMMARY
          for f in release/*.dmg; do
            echo "- \`$(basename $f)\` ($(du -h "$f" | cut -f1))" >> $GITHUB_STEP_SUMMARY
          done
