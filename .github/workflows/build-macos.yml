name: Build macOS

on:
  workflow_dispatch:

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build macOS DMG
        run: npm run build:mac
        env:
          VITE_DEV_SERVER_URL: ""

      - name: Verify build output
        run: |
          echo "## Build Output" >> $GITHUB_STEP_SUMMARY
          ls -lh release/*.dmg >> $GITHUB_STEP_SUMMARY 2>&1 || true
          ls -lh release/
          if ! ls release/*.dmg 1>/dev/null 2>&1; then
            echo "::error::No .dmg files found in release/"
            exit 1
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssampin-macos-${{ github.sha }}
          path: |
            release/*.dmg
            release/*.blockmap
            release/latest-mac.yml
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: success()
        run: |
          echo "## macOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          for f in release/*.dmg; do
            echo "- \`$(basename $f)\` ($(du -h "$f" | cut -f1))" >> $GITHUB_STEP_SUMMARY
          done
