publish:
  provider: github
appId: com.ssampin.app
productName: 쌤핀
directories:
  buildResources: build
  output: release
extraResources:
  - from: "build/icon.ico"
    to: "icon.ico"
files:
  - from: "."
    to: "."
    filter:
      - "package.json"
      - "dist/**/*"
      - "dist-electron/**/*"
      - "node_modules/**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  fileAssociations:
    - ext: ssampin
      name: SsamPin 일정 파일
      description: 쌤핀 일정 공유 파일
      role: Editor
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: 쌤핀
  artifactName: ssampin-Setup.${ext}
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.png
  category: public.app-category.education
  fileAssociations:
    - ext: ssampin
      name: SsamPin 일정 파일
      role: Editor
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  artifactName: ssampin-${arch}.${ext}
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
